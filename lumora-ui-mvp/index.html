<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumora UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="main-container">
        <section class="preview-panel">
            <div id="element" class="target-element"></div>
        </section>

        <section class="controls-panel">
            <div class="top-row">
                <h1>Lumora UI</h1>
                <button id="theme-btn" class="icon-btn">🌙</button>
            </div>

            <p class="subtitle">Gerador visual de estilos Soft UI personalizados.</p>
            
            <div class="control-group color-group">
                <label>Cor de Fundo</label>
                <div class="color-picker-row">
                    <input type="color" id="color-picker" value="#d6d6d6">
                    <span id="color-value">#d6d6d6</span>
                </div>
            </div>

            <div class="control-group">
                <label>Presets Rápidos</label>
                <div class="preset-buttons">
                    <button onclick="applyPreset('minimal')">Minimal</button>
                    <button onclick="applyPreset('soft')">Soft</button>
                    <button onclick="applyPreset('intense')">Intenso</button>
                </div>
            </div>

            <div class="control-group">
                <label>Arredondamento</label>
                <div class="radius-buttons">
                    <button onclick="updateRadius(12)">Suave</button>
                    <button onclick="updateRadius(40)">Curvo</button>
                    <button onclick="updateRadius(100)">Círculo</button>
                </div>
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span>Distância</span>
                    <span id="label-distance">20px</span>
                </div>
                <input type="range" id="distance" min="0" max="50" value="20">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span>Desfoque (Blur)</span>
                    <span id="label-blur">40px</span>
                </div>
                <input type="range" id="blur" min="0" max="100" value="40">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span>Intensidade</span>
                    <span id="label-intensity">0.15</span>
                </div>
                <input type="range" id="intensity" min="0.01" max="0.6" step="0.01" value="0.15">
            </div>

            <div class="code-box">
                <pre id="css-output">box-shadow: ...</pre>
                <button id="copy-btn">Copiar CSS</button>
                <button id="download-btn">Baixar CSS</button>
                <button id="save-history-btn">Salvar no Histórico</button>
            </div>

            <div class="history-box">
                <h2>Histórico de Estilos</h2>
                <div id="history-list"></div>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
